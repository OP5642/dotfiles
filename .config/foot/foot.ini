[main]
font=SauceCodePro Nerd Font:size=13

[colors-dark]
alpha=0.9

[scrollback]
multiplier=3.0

[key-bindings]
scrollback-up-line=Alt+u
scrollback-down-line=Alt+r
clipboard-copy=Alt+c
clipboard-paste=Alt+v
font-increase=Alt+Shift+U
font-decrease=Alt+Shift+D
pipe-scrollback=[foot-copy-output] Alt+o
