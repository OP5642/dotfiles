# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = ALT # Sets ALT key as main modifier

# ── Apps ──────────────────────────────────────────────────────────────────────
bind = $mainMod SHIFT, Return, exec, $terminal
bind = $mainMod, P,            exec, $menu
bind = $mainMod, W,            exec, firefox

# ── Window management ─────────────────────────────────────────────────────────
bind = $mainMod SHIFT, C,      killactive,
bind = $mainMod SHIFT, Space,  togglefloating,
bind = $mainMod, Return,       layoutmsg, swapwithmaster
bind = $mainMod, B,            exec, pkill -SIGUSR1 waybar

# Focus stack
bind = $mainMod, H,            movefocus, l
bind = $mainMod, J,            movefocus, d
bind = $mainMod, K,            movefocus, u
bind = $mainMod, L,            movefocus, r

# Resize master/stack
bind = $mainMod, H,            layoutmsg, cycleprev
bind = $mainMod, L,            layoutmsg, cyclenext 

bind = $mainMod SHIFT, L, resizeactive, 20 0
bind = $mainMod SHIFT, H, resizeactive, -20 0
bind = $mainMod SHIFT, K, resizeactive, 0 -20
bind = $mainMod SHIFT, J, resizeactive, 0 20

bindel = $mainMod SHIFT, l, moveactive, 100 0
bindel = $mainMod SHIFT, h, moveactive, -100 0
bindel = $mainMod SHIFT, k, moveactive, 0 -100
bindel = $mainMod SHIFT, j, moveactive, 0 100


# Number of master windows
bind = $mainMod, I,            layoutmsg, addmaster
bind = $mainMod, D,            layoutmsg, removemaster

# Layouts
bind = $mainMod, T,            layoutmsg, orientationtop
bind = $mainMod, F,            fullscreen, 0
bind = $mainMod, M,            fullscreen, 1

# # ── Move focus with mainMod + arrow keys ──────────────────────────────────────
# bind = $mainMod, left,         movefocus, l
# bind = $mainMod, right,        movefocus, r
# bind = $mainMod, up,           movefocus, u
# bind = $mainMod, down,         movefocus, d

# ── Switch workspaces with mainMod + [0-9] ────────────────────────────────────
bind = $mainMod, 1,            workspace, 1
bind = $mainMod, 2,            workspace, 2
bind = $mainMod, 3,            workspace, 3
bind = $mainMod, 4,            workspace, 4
bind = $mainMod, 5,            workspace, 5
bind = $mainMod, 6,            workspace, 6
bind = $mainMod, 7,            workspace, 7
bind = $mainMod, 8,            workspace, 8
bind = $mainMod, 9,            workspace, 9
bind = $mainMod, 0,            workspace, 10

# ── Move active window to a workspace with mainMod + SHIFT + [0-9] ────────────
bind = $mainMod SHIFT, 1,      movetoworkspace, 1
bind = $mainMod SHIFT, 2,      movetoworkspace, 2
bind = $mainMod SHIFT, 3,      movetoworkspace, 3
bind = $mainMod SHIFT, 4,      movetoworkspace, 4
bind = $mainMod SHIFT, 5,      movetoworkspace, 5
bind = $mainMod SHIFT, 6,      movetoworkspace, 6
bind = $mainMod SHIFT, 7,      movetoworkspace, 7
bind = $mainMod SHIFT, 8,      movetoworkspace, 8
bind = $mainMod SHIFT, 9,      movetoworkspace, 9
bind = $mainMod SHIFT, 0,      movetoworkspace, 10

# Next/prev workspace
bind = $mainMod, right,        workspace, e+1
bind = $mainMod, left,         workspace, e-1
bind = $mainMod SHIFT, right,  movetoworkspace, r+1
bind = $mainMod SHIFT, left,   movetoworkspace, r-1

# ── Monitor focus ─────────────────────────────────────────────────────────────
bind = $mainMod, comma,        focusmonitor, -1
bind = $mainMod, period,       focusmonitor, +1
bind = $mainMod SHIFT, comma,  movewindow, mon:-1
bind = $mainMod SHIFT, period, movewindow, mon:+1

# ── Special workspace (scratchpad) ────────────────────────────────────────────
bind = $mainMod, S,            togglespecialworkspace, magic
bind = $mainMod SHIFT, S,      movetoworkspace, special:magic

# ── Scroll through workspaces with mainMod + scroll ───────────────────────────
bind = $mainMod, mouse_down,   workspace, e+1
bind = $mainMod, mouse_up,     workspace, e-1

# ── Move/resize windows with mainMod + LMB/RMB and dragging ──────────────────
bindm = $mainMod, mouse:272,   movewindow
bindm = $mainMod, mouse:273,   resizewindow
bind  = $mainMod, mouse:274,   togglefloating,

# ── Volume ────────────────────────────────────────────────────────────────────
bindel = ,      XF86AudioRaiseVolume, exec, pamixer -i 5
bindel = SHIFT, XF86AudioRaiseVolume, exec, pamixer --allow-boost -i 5
bindel = ,      XF86AudioLowerVolume, exec, pamixer -d 5
bindel = SHIFT, XF86AudioLowerVolume, exec, pamixer --allow-boost -d 5
bindel = ,      XF86AudioMute,        exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindel = ,      XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# ── Brightness ────────────────────────────────────────────────────────────────
bindel = , XF86MonBrightnessUp,       exec, light -A 5
bindel = , XF86MonBrightnessDown,     exec, light -U 5

# ── Media ─────────────────────────────────────────────────────────────────────
bindl = , XF86AudioNext,              exec, playerctl next
bindl = , XF86AudioPause,             exec, playerctl play-pause
bindl = , XF86AudioPlay,              exec, playerctl play-pause
bindl = , XF86AudioPrev,              exec, playerctl previous

# ── Screenshots ───────────────────────────────────────────────────────────────
bind = ,      Print, exec, grim - | tee ~/Pictures/Screenshots/$(date '+%F-%H-%M-%S').png | wl-copy
bind = SHIFT, Print, exec, grim -g "$(slurp)" - | tee ~/Pictures/Screenshots/$(date '+%F-%H-%M-%S').png | wl-copy

# ── Quit ──────────────────────────────────────────────────────────────────────
bind = $mainMod SHIFT, Q,     exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
